<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tank Quiz</title>
  <style>
    body { font-family: Arial; background:#f3f4f6; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
    .quiz-box { background:white; padding:20px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); width:360px; text-align:center; max-height:90vh; overflow:auto; }
    button { display:block; width:100%; margin:5px 0; padding:10px; border:none; border-radius:8px; background:#3b82f6; color:white; cursor:pointer; }
    button:hover { background:#2563eb; }
    .correct { color:green; }
    .wrong { color:red; }
    .timer { font-weight:bold; margin-bottom:10px; }
    .small { font-size:12px; color:gray; }
  </style>
</head>
<body>
<div class="quiz-box">
  <div class="timer" id="timer"></div>
  <h2 id="question"></h2>
  <div id="answers"></div>
  <p class="small" id="progress"></p>
</div>

<script>
const questions = [
  {q:"Кой танк използва композитна броня Chobham?",o:["Abrams","T-55","Panzer IV","Tiger I"],a:"Abrams"},
  {q:"Кой танк е първият с автоматично зареждане (autoloading)?",o:["T-64","Sherman","Tiger I","Challenger"],a:"T-64"},
  {q:"Какво означава ERA броня?",o:["Explosive Reactive Armor","Extra Reinforced Armor","Electronic Radar Armor","External Reinforced Alloy"],a:"Explosive Reactive Armor"},
  {q:"Кой танк има газотурбинен двигател?",o:["M1 Abrams","Leopard 2","T-90","Challenger 2"],a:"M1 Abrams"},
  {q:"Кой е основният калибър на модерните MBT?",o:["120-125mm","75mm","90mm","150mm"],a:"120-125mm"},
  {q:"Кой танк използва 125mm оръдие?",o:["T-90","Abrams","Leclerc","Challenger"],a:"T-90"},
  {q:"Кой танк е известен с изключително точна система за управление на огъня?",o:["Leopard 2","T-55","Panther","Sherman"],a:"Leopard 2"},
  {q:"Коя държава разработва Merkava?",o:["Israel","USA","Germany","France"],a:"Israel"},
  {q:"Какво е основното предимство на Merkava?",o:["Преден двигател за защита","По-голямо оръдие","По-висока скорост","По-малко тегло"],a:"Преден двигател за защита"},
  {q:"Кой танк е първият с многослойна броня?",o:["T-64","Tiger","Sherman","Panther"],a:"T-64"},
  {q:"Какво означава APFSDS?",o:["Armor Piercing Fin Stabilized Discarding Sabot","Anti Personnel Fragmentation","Advanced Projectile System","Armor Piercing Full Steel"],a:"Armor Piercing Fin Stabilized Discarding Sabot"},
  {q:"Кой танк използва rifled gun?",o:["Challenger 2","Abrams","Leopard 2","T-90"],a:"Challenger 2"},
  {q:"Кой е най-тежкият танк от WWII?",o:["Maus","Tiger I","IS-2","Panther"],a:"Maus"},
  {q:"Какво е слабост на Tiger I?",o:["Висок разход и сложна поддръжка","Слаба броня","Слабо оръдие","Ниска точност"],a:"Висок разход и сложна поддръжка"},
  {q:"Кой танк е известен със своята мобилност и наклонена броня?",o:["T-34","Tiger","Sherman","Maus"],a:"T-34"},
  {q:"Какво е FCS?",o:["Fire Control System","Fuel Control System","Field Combat System","Fast Cannon System"],a:"Fire Control System"},
  {q:"Кой танк има crew capsule дизайн?",o:["T-14 Armata","Abrams","Leopard","Challenger"],a:"T-14 Armata"},
  {q:"Коя държава създава Leopard 2?",o:["Germany","France","USA","Italy"],a:"Germany"},
  {q:"Какво е основното предназначение на MBT?",o:["Универсална бойна роля","Само защита","Само атака","Разузнаване"],a:"Универсална бойна роля"},
  {q:"Кой танк има най-добра защита на екипажа?",o:["T-14 Armata","T-55","Panther","Sherman"],a:"T-14 Armata"},
  {q:"Какво означава HEAT?",o:["High Explosive Anti-Tank","Heavy Explosive Armor Type","High Energy Armor Tech","Hybrid Explosive Ammo"],a:"High Explosive Anti-Tank"},
  {q:"Кой танк използва blowout panels?",o:["Abrams","T-72","Tiger","Panther"],a:"Abrams"},
  {q:"Кой е най-важният фактор за оцеляване на танк?",o:["Комбинация от броня, мобилност и огнева мощ","Само броня","Само оръдие","Само скорост"],a:"Комбинация от броня, мобилност и огнева мощ"},
  {q:"Какво е weak spot при танковете?",o:["Задната броня","Куполът","Оръдието","Гъсениците"],a:"Задната броня"},
  {q:"Кой танк е модерен руски?",o:["T-90","Tiger","Sherman","Panther"],a:"T-90"},
  {q:"Кой танк има най-добра електроника?",o:["Leopard 2","T-55","Tiger","IS-2"],a:"Leopard 2"},
  {q:"Какво е reload time?",o:["Време за презареждане","Време за движение","Време за стрелба","Време за завой"],a:"Време за презареждане"},
  {q:"Кой танк има autoloader?",o:["T-72","Abrams","Challenger","Leopard"],a:"T-72"},
  {q:"Кой танк е британски?",o:["Challenger 2","Abrams","T-90","Leopard"],a:"Challenger 2"},
  {q:"Кой танк е френски?",o:["Leclerc","Abrams","T-90","Leopard"],a:"Leclerc"},
  {q:"Кой танк е китайски?",o:["Type 99","Abrams","Leopard","Challenger"],a:"Type 99"},
  {q:"Кой танк е израелски?",o:["Merkava","Abrams","Leopard","T-90"],a:"Merkava"},
  {q:"Какво е penetration?",o:["Пробивна способност","Скорост","Тегло","Броня"],a:"Пробивна способност"},
  {q:"Кой танк е най-модерен руски?",o:["T-14 Armata","T-34","T-55","IS-2"],a:"T-14 Armata"},
  {q:"Какво е armor thickness?",o:["Дебелина на бронята","Скорост","Мощност","Тегло"],a:"Дебелина на бронята"}
];

let current=0, score=0, timeLeft=360;
let userAnswers=[];

const qEl=document.getElementById("question");
const aEl=document.getElementById("answers");
const pEl=document.getElementById("progress");
const tEl=document.getElementById("timer");

function timer(){
  let m=Math.floor(timeLeft/60);
  let s=timeLeft%60;
  tEl.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  if(timeLeft<=0) showResult();
  timeLeft--;
}
setInterval(timer,1000);

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function load(){
  let q=questions[current];
  qEl.textContent=q.q;
  aEl.innerHTML="";

  let shuffledOptions = shuffle([...q.o]);

  shuffledOptions.forEach(opt=>{
    let b=document.createElement("button");
    b.textContent=opt;
    b.onclick=()=>answer(opt);
    aEl.appendChild(b);
  });

  pEl.textContent=`Въпрос ${current+1} / ${questions.length}`;
}

function answer(opt){
  let correct=questions[current].a;
  userAnswers.push({q:questions[current].q, user:opt, correct});
  if(opt===correct) score++;
  current++;
  if(current<questions.length) load(); else showResult();
}

function showResult(){
  qEl.textContent="Край!";
  let html=`<p>Резултат: ${score} / ${questions.length}</p>`;
  userAnswers.forEach(x=>{
    let ok=x.user===x.correct;
    html+=`<p class="${ok?"correct":"wrong"}">
      ${x.q}<br>
      Ти: ${x.user} | Вярно: ${x.correct}
    </p>`;
  });
  html+=`<button onclick="location.reload()">Рестарт</button>`;
  aEl.innerHTML=html;
  pEl.textContent="";
}

load();
</script>
</body>
</html>
