<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tank Quiz PRO</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.box{background:#111827;padding:25px;border-radius:20px;width:400px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.6);max-height:90vh;overflow:auto}
button{width:100%;margin:6px 0;padding:12px;border:none;border-radius:10px;background:#3b82f6;color:white;cursor:pointer;font-weight:bold}
button:hover{background:#2563eb}
.correct{color:#4ade80}
.wrong{color:#f87171}
.timer{margin-bottom:10px;font-weight:bold}
</style>
</head>
<body>
<div class="box" id="app"></div>

<script>
let timeLeft=480;
let timerId;
let current=0,score=0;
let userAnswers=[];
let questions=[];
let useTimer=true;

// ВЪПРОСИ (разделени по трудност)
const easy=[
 {q:"Кой танк използва композитна броня Chobham?",o:["Abrams","T-55","Panzer IV","Tiger I"],a:"Abrams"},
  {q:"Кой танк е първият с автоматично зареждане (autoloading)?",o:["T-64","Sherman","Tiger I","Challenger"],a:"T-64"},
  {q:"Какво означава ERA броня?",o:["Explosive Reactive Armor","Extra Reinforced Armor","Electronic Radar Armor","External Reinforced Alloy"],a:"Explosive Reactive Armor"},
  {q:"Кой танк има газотурбинен двигател?",o:["M1 Abrams","Leopard 2","T-90","Challenger 2"],a:"M1 Abrams"},
  {q:"Кой е основният калибър на модерните MBT?",o:["120-125mm","75mm","90mm","150mm"],a:"120-125mm"},
  {q:"Кой танк използва 125mm оръдие?",o:["T-90","Abrams","Leclerc","Challenger"],a:"T-90"},
  {q:"Какво означава APFSDS?",o:["Armor Piercing Fin Stabilized Discarding Sabot","Anti Personnel Fragmentation","Advanced Projectile System","Armor Piercing Full Steel"],a:"Armor Piercing Fin Stabilized Discarding Sabot"},
  {q:"Кой танк използва rifled gun?",o:["Challenger 2","Abrams","Leopard 2","T-90"],a:"Challenger 2"},
  {q:"Кой е най-тежкият танк от WWII?",o:["Maus","Tiger I","IS-2","Panther"],a:"Maus"},
  {q:"Какво е слабост на Tiger I?",o:["Висок разход и сложна поддръжка","Слаба броня","Слабо оръдие","Ниска точност"],a:"Висок разход и сложна поддръжка"},
  {q:"Кой танк има crew capsule дизайн?",o:["T-14 Armata","Abrams","Leopard","Challenger"],a:"T-14 Armata"},
  {q:"Какво означава HEAT?",o:["High Explosive Anti-Tank","Heavy Explosive Armor Type","High Energy Armor Tech","Hybrid Explosive Ammo"],a:"High Explosive Anti-Tank"},
  {q:"Кой танк използва blowout panels?",o:["Abrams","T-72","Tiger","Panther"],a:"Abrams"},
  {q:"Какво е FCS?",o:["Fire Control System","Fuel Control System","Field Combat System","Fast Cannon System"],a:"Fire Control System"},
];

const medium=[
  {q:"Какъв тип броня използва T-14 Armata?",o:["Composite + ERA + Active Protection","Steel only","Aluminum","Titanium"],a:"Composite + ERA + Active Protection"},
  {q:"Как се казва активната защита на руски танкове?",o:["Afghanit","Trophy","Iron Fist","Arena"],a:"Afghanit"},
  {q:"Какво е Trophy?",o:["Active Protection System","Gun type","Engine","Armor plate"],a:"Active Protection System"},
  {q:"Кой танк използва Trophy?",o:["Merkava","T-72","Panther","Tiger"],a:"Merkava"},
  {q:"Какво означава NATO стандарт 120mm?",o:["Гладкоцевно оръдие","Рифеловано","Малък калибър","Автоматично"],a:"Гладкоцевно оръдие"},
  {q:"Кой танк има най-добра защита срещу HEAT?",o:["С ERA","Без броня","Слаб танк","Лек танк"],a:"С ERA"},
  {q:"Какво е glacis plate?",o:["Предна наклонена броня","Задна част","Купол","Оръдие"],a:"Предна наклонена броня"},
  {q:"Какво означава sloped armor?",o:["Наклонена броня","Тънка броня","Дебела броня","Кръгла броня"],a:"Наклонена броня"},
  {q:"Кой танк първи използва наклонена броня ефективно?",o:["T-34","Tiger","Sherman","Panzer I"],a:"T-34"},
  {q:"Какво е kinetic energy round?",o:["Снаряд с кинетична енергия","Експлозивен","Газов","Лазерен"],a:"Снаряд с кинетична енергия"},
  {q:"Какво е sabot?",o:["Обвивка за ускорение","Тип броня","Двигател","Гориво"],a:"Обвивка за ускорение"},
  {q:"Какво означава penetration depth?",o:["Дълбочина на пробив","Скорост","Тегло","Мощност"],a:"Дълбочина на пробив"},
  {q:"Какво е turret ring?",o:["Място на въртене на купола","Оръдие","Броня","Гъсеница"],a:"Място на въртене на купола"},
  {q:"Какво е spall?",o:["Вътрешни фрагменти","Външна броня","Гориво","Оръдие"],a:"Вътрешни фрагменти"},
  {q:"Какво е spaced armor?",o:["Разделена броня","Една плоча","Тънка броня","Лека броня"],a:"Разделена броня"},
  {q:"Какво означава hull down?",o:["Само куполът се вижда","Целият танк","Без оръдие","Скрит двигател"],a:"Само куполът се вижда"},
  {q:"Какво е reverse speed важно за?",o:["Отстъпление","Атака","Броня","Оръдие"],a:"Отстъпление"},
  {q:"Кой танк има най-добра reverse speed?",o:["Leopard 2","T-72","Tiger","IS-2"],a:"Leopard 2"},
  {q:"Какво е thermal sight?",o:["Термално виждане","Нощен прицел","Радар","GPS"],a:"Термално виждане"},
  {q:"Какво е active protection system?",o:["Система за унищожаване на снаряди","Броня","Оръдие","Двигател"],a:"Система за унищожаване на снаряди"},
  {q:"Какво е soft kill APS?",o:["Отклонява ракети","Унищожава ги","Броня","Гориво"],a:"Отклонява ракети"},
  {q:"Какво е hard kill APS?",o:["Унищожава ракети","Отклонява","Броня","Скорост"],a:"Унищожава ракети"},
  {q:"Какво е боекомплект blowout?",o:["Извеждане на експлозията навън","Повече щети","По-малко броня","Скорост"],a:"Извеждане на експлозията навън"},
  {q:"Кой танк има blowout panels?",o:["Abrams","T-55","Panther","IS-2"],a:"Abrams"},
];

const hard=[
 {q:"Какво е coaxial machine gun?",o:["Картечница до оръдието","Задна картечница","ПВО оръжие","Ракетна система"],a:"Картечница до оръдието"},
  {q:"Какво означава gun depression?",o:["Ъгъл надолу на оръдието","Скорост","Броня","Зареждане"],a:"Ъгъл надолу на оръдието"},
  {q:"Кой танк има отличен gun depression?",o:["Leopard 2","T-72","IS-2","Tiger"],a:"Leopard 2"},
  {q:"Какво е overmatch в танковете?",o:["Пробив при тънка броня","Скорост","Тегло","Двигател"],a:"Пробив при тънка броня"},
  {q:"Какво е ricochet?",o:["Рикошет","Експлозия","Пробив","Зареждане"],a:"Рикошет"},
  {q:"Какво влияе на рикошет?",o:["Ъгъл на удара","Цвят","Шум","Температура"],a:"Ъгъл на удара"},
  {q:"Какво е camouflage важен за?",o:["Скриване","Скорост","Броня","Оръдие"],a:"Скриване"},
  {q:"Какво е line of sight?",o:["Линия на видимост","Скорост","Броня","Гориво"],a:"Линия на видимост"},
  {q:"Какво е flanking?",o:["Атака отстрани","Фронтална атака","Отстъпление","Защита"],a:"Атака отстрани"},
  {q:"Какво е angling armor?",o:["Ъглово поставяне на броня","Право стоене","Без движение","Скорост"],a:"Ъглово поставяне на броня"},
  {q:"Какво е DPM?",o:["Damage per minute","Distance per move","Defense per mass","Drive power mode"],a:"Damage per minute"},
  {q:"Какво е alpha damage?",o:["Щета от един изстрел","Скорост","Броня","Тегло"],a:"Щета от един изстрел"},
  {q:"Какво е module damage?",o:["Щета по вътрешни части","Скорост","Броня","Оръдие"],a:"Щета по вътрешни части"},
  {q:"Какво е crew knock-out?",o:["Екипажът е елиминиран","Броня","Скорост","Оръдие"],a:"Екипажът е елиминиран"},
  {q:"Какво е ammunition rack?",o:["Боекомплект","Двигател","Броня","Оръдие"],a:"Боекомплект"},
  {q:"Какво става при ammo rack explosion?",o:["Моментално унищожение","Нищо","Само дим","По-бързо движение"],a:"Моментално унищожение"}

];

const app=document.getElementById("app");

function menu(){
  app.innerHTML=`
    <h2>Избери режим</h2>
    <button onclick="modeSelect(true)">⏱️ С таймер (8 мин)</button>
    <button onclick="modeSelect(false)">❌ Без таймер</button>
  `;
}

function modeSelect(timerChoice){
  useTimer=timerChoice;
  app.innerHTML=`
    <h2>Избери трудност</h2>
    <button onclick="start('easy')">🟢 Лесни</button>
    <button onclick="start('medium')">🟡 Трудни</button>
    <button onclick="start('hard')">🔴 МНОГО ТРУДНИ</button>
  `;
}

function start(mode){
  questions = mode==='easy'?easy:mode==='medium'?medium:hard;
  current=0;score=0;userAnswers=[];timeLeft=480;
  if(useTimer) startTimer();
  load();
}

function startTimer(){
  clearInterval(timerId);
  timerId=setInterval(()=>{
    let m=Math.floor(timeLeft/60),s=timeLeft%60;
    let t=document.getElementById("timer");
    if(t) t.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
    if(timeLeft<=0){clearInterval(timerId);result();}
    timeLeft--;
  },1000);
}

function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a}

function load(){
  let q=questions[current];
  let opts=shuffle([...q.o]);

  app.innerHTML=`
    ${useTimer?'<div id="timer"></div>':''}
    <h3>${q.q}</h3>
    ${opts.map(o=>`<button onclick="answer('${o}')">${o}</button>`).join('')}
    <p>${current+1}/60</p>
  `;
}

function answer(opt){
  let correct=questions[current].a;
  userAnswers.push({q:questions[current].q,user:opt,correct});
  if(opt===correct) score++;
  current++;
  if(current<questions.length) load(); else result();
}

function result(){
  clearInterval(timerId);
  let html=`<h2>Край</h2><p>${score}/60</p>`;
  userAnswers.forEach(x=>{
    let ok=x.user===x.correct;
    html+=`<p class='${ok?"correct":"wrong"}'>${x.q}<br>Ти: ${x.user} | Вярно: ${x.correct}</p>`;
  });
  html+=`<button onclick="menu()">Назад</button>`;
  app.innerHTML=html;
}

menu();
</script>
</body>
</html>
