<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tank Quiz 180 въпроса</title>
<style>
body { font-family: Arial; background:#1f2937; color:#f9fafb; text-align:center; margin:0; padding:20px; }
h1 { margin-bottom:20px; }
button { padding:10px 20px; margin:5px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; background:#3b82f6; color:white; }
button:hover { background:#2563eb; }
#quiz-box { margin-top:20px; padding:15px; background:#111827; border-radius:15px; display:none; }
#answers button { display:block; margin:5px auto; width:80%; }
#timer { margin-top:10px; font-weight:bold; }
</style>
</head>
<body>
<h1>Tank Quiz - Избери трудност</h1>

<div id="difficulty-buttons">
  <button onclick="startQuiz('Лесен')">Лесен</button>
  <button onclick="startQuiz('Труден')">Труден</button>
  <button onclick="startQuiz('Много труден')">Много труден</button>
</div>

<div id="quiz-box">
  <div id="difficulty-display"></div>
  <div id="question-title"></div>
  <div id="answers"></div>
  <div id="progress"></div>
  <div id="timer"></div>
</div>

<script>
// 180 въпроса – 60 за всяка трудност
const allQuestions = [];

// --- Генериране на 60 въпроса за Лесен (примерни повтарящи се въпроси) ---
for(let i=1;i<=60;i++){
  allQuestions.push({
    q:`Лесен въпрос ${i}`,
    o:[`Опция A`,`Опция B`,`Опция C`,`Опция D`],
    a:`Опция A`,
    difficulty:`Лесен`
  });
}

// --- 60 въпроса за Труден ---
for(let i=1;i<=60;i++){
  allQuestions.push({
    q:`Труден въпрос ${i}`,
    o:[`Опция A`,`Опция B`,`Опция C`,`Опция D`],
    a:`Опция B`,
    difficulty:`Труден`
  });
}

// --- 60 въпроса за Много труден ---
for(let i=1;i<=60;i++){
  allQuestions.push({
    q:`Много труден въпрос ${i}`,
    o:[`Опция A`,`Опция B`,`Опция C`,`Опция D`],
    a:`Опция C`,
    difficulty:`Много труден`
  });
}

let questions=[], current=0, score=0, timerId=null, timeLeft=600;
const quizBox=document.getElementById("quiz-box");
const diffDisplay=document.getElementById("difficulty-display");
const qTitle=document.getElementById("question-title");
const answersDiv=document.getElementById("answers");
const progressDiv=document.getElementById("progress");
const timerDiv=document.getElementById("timer");

// Разбъркване
function shuffle(array){ for(let i=array.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [array[i],array[j]]=[array[j],array[i]];} return array;}

// Стартира quiz по трудност
function startQuiz(diff){
  questions = shuffle(allQuestions.filter(q=>q.difficulty===diff));
  current=0; score=0; timeLeft=600;
  quizBox.style.display="block";
  diffDisplay.textContent = `Трудност: ${diff}`;
  startTimer();
  loadQuestion();
}

// Таймер
function startTimer(){
  clearInterval(timerId);
  timerId = setInterval(()=>{
    let m=Math.floor(timeLeft/60), s=timeLeft%60;
    timerDiv.textContent = `⏱️ ${m}:${s.toString().padStart(2,'0')}`;
    if(timeLeft<=0){ clearInterval(timerId); showResult(); }
    timeLeft--;
  },1000);
}

// Показване на въпрос
function loadQuestion(){
  if(current>=questions.length){ showResult(); return; }
  let q = questions[current];
  qTitle.textContent = q.q;
  answersDiv.innerHTML = "";
  q.o.forEach(opt=>{
    const b = document.createElement("button");
    b.textContent = opt;
    b.onclick = ()=>answer(opt);
    answersDiv.appendChild(b);
  });
  progressDiv.textContent = `Въпрос ${current+1} / ${questions.length}`;
}

// Отговор
function answer(opt){
  let q = questions[current];
  if(opt===q.a) score++;
  current++;
  loadQuestion();
}

// Резултат
function showResult(){
  clearInterval(timerId);
  qTitle.textContent="Край!";
  answersDiv.innerHTML = `<p>Резултат: ${score} / ${questions.length}</p><button onclick="location.reload()">Рестарт</button>`;
  progressDiv.textContent="";
  timerDiv.textContent="";
}
</script>
</body>
</html>
