<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tank Quiz</title>
<style>
body { font-family: Arial; background:#1f2937; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
.quiz-box { background:#111827; padding:25px; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.5); width:380px; color:#f9fafb; text-align:center; max-height:90vh; overflow:auto; }
button { display:block; width:100%; margin:6px 0; padding:12px; border:none; border-radius:10px; background:#3b82f6; color:white; cursor:pointer; font-weight:bold; font-size:14px; }
button:hover { background:#2563eb; }
.correct { color:#4ade80; font-weight:bold; }
.wrong { color:#f87171; font-weight:bold; }
.timer { font-weight:bold; margin-bottom:12px; font-size:16px; }
.small { font-size:12px; color:#9ca3af; }
h2 { font-size:18px; margin-bottom:15px; }
</style>
</head>
<body>
<div class="quiz-box">
<div class="timer" id="timer"></div>
<h2 id="question"></h2>
<div id="answers"></div>
<p class="small" id="progress"></p>
</div>
<script>

  // МНОГО ТРУДНИ 👇
  {q:"Какъв тип броня използва T-14 Armata?",o:["Composite + ERA + Active Protection","Steel only","Aluminum","Titanium"],a:"Composite + ERA + Active Protection"},

  {q:"Какво означава NATO стандарт 120mm?",o:["Гладкоцевно оръдие","Рифеловано","Малък калибър","Автоматично"],a:"Гладкоцевно оръдие"},
  {q:"Кой танк има най-добра защита срещу HEAT?",o:["С ERA","Без броня","Слаб танк","Лек танк"],a:"С ERA"},

  {q:"Какво означава penetration depth?",o:["Дълбочина на пробив","Скорост","Тегло","Мощност"],a:"Дълбочина на пробив"},
  {q:"Какво е turret ring?",o:["Място на въртене на купола","Оръдие","Броня","Гъсеница"],a:"Място на въртене на купола"},
  {q:"Какво е spall?",o:["Вътрешни фрагменти","Външна броня","Гориво","Оръдие"],a:"Вътрешни фрагменти"},
  {q:"Какво е spaced armor?",o:["Разделена броня","Една плоча","Тънка броня","Лека броня"],a:"Разделена броня"},
  {q:"Какво означава hull down?",o:["Само куполът се вижда","Целият танк","Без оръдие","Скрит двигател"],a:"Само куполът се вижда"},
  {q:"Какво е reverse speed важно за?",o:["Отстъпление","Атака","Броня","Оръдие"],a:"Отстъпление"},

  {q:"Какво е thermal sight?",o:["Термално виждане","Нощен прицел","Радар","GPS"],a:"Термално виждане"},
  {q:"Какво е active protection system?",o:["Система за унищожаване на снаряди","Броня","Оръдие","Двигател"],a:"Система за унищожаване на снаряди"},
  {q:"Какво е soft kill APS?",o:["Отклонява ракети","Унищожава ги","Броня","Гориво"],a:"Отклонява ракети"},
  {q:"Какво е hard kill APS?",o:["Унищожава ракети","Отклонява","Броня","Скорост"],a:"Унищожава ракети"},
  {q:"Какво е боекомплект blowout?",o:["Извеждане на експлозията навън","Повече щети","По-малко броня","Скорост"],a:"Извеждане на експлозията навън"},
  {q:"Кой танк има blowout panels?",o:["Abrams","T-55","Panther","IS-2"],a:"Abrams"},
  {q:"Кой танк е известен с използването на reactive armor на първо място?",o:["T-72","M1 Abrams","Leopard 2","Challenger 2"],a:"T-72"},
  {q:"Кой танк използва роторен автоматичен заряд?",o:["T-64","Abrams","Leclerc","Merkava"],a:"T-64"},
  {q:"Какво означава MBT?",o:["Main Battle Tank","Medium Battle Tank","Mobile Base Tank","Modern Battle Tank"],a:"Main Battle Tank"},
  {q:"Кой танк използва тандемна HEAT ракета за APS тестове?",o:["Merkava","T-90","Abrams","Leopard 2"],a:"Merkava"},
  {q:"Какво е основното предимство на композитната броня?",o:["Повече защита при по-малко тегло","Лесна поддръжка","По-малко гориво","По-бързо движение"],a:"Повече защита при по-малко тегло"},
  {q:"Кой танк използва хидропневматична суспензия?",o:["Leclerc","T-72","Abrams","T-14 Armata"],a:"Leclerc"},
  {q:"Какво означава APS?",o:["Active Protection System","Automatic Protection System","Armored Protection System","Advanced Projectile System"],a:"Active Protection System"},
  {q:"Кой танк първи използва blowout panels за защита на екипажа?",o:["M1 Abrams","Leopard 2","T-80","Challenger 2"],a:"M1 Abrams"},
  {q:"Какво е main gun stabilization?",o:["Стабилизиране на оръдието за стрелба в движение","Заключване на бронята","Контрол на двигателя","Система за комуникация"],a:"Стабилизиране на оръдието за стрелба в движение"},
  {q:"Коя броня е най-ефективна срещу kinetic energy rounds?",o:["Composite + ERA","ERA само","Стандартна стомана","Aluminum"],a:"Composite + ERA"},
  {q:"Кой танк използва rifled main gun в съвременна епоха?",o:["Challenger 2","Abrams","Leopard 2","T-90"],a:"Challenger 2"},
  {q:"Какво означава L/44 при оръдия?",o:["Дължина на цевта 44 калибра","Тип боеприпас","Скорост на куршума","Брой заряди"],a:"Дължина на цевта 44 калибра"},
  {q:"Какво е disadvantage на газотурбинен двигател на Abrams?",o:["Висок разход на гориво","Слаба броня","Тежък оръдиен модул","Сложна електроника"],a:"Висок разход на гориво"},
  {q:"Кой танк има автоматично зареждане и безелна касета?",o:["T-14 Armata","Abrams","Challenger 2","Leopard 2"],a:"T-14 Armata"},
  {q:"Кой танк използва modular armor за лесна замяна?",o:["Leopard 2","T-72","M1 Abrams","Challenger 2"],a:"Leopard 2"},
  {q:"Какво е ERA тандемна плоча?",o:["Две експлозивни плочи за HEAT защита","Двойна стомана","Комбинация от алуминий и стомана","Защита срещу kinetic rounds"],a:"Две експлозивни плочи за HEAT защита"},
  {q:"Кой танк първи използва наклонена броня за максимална ефективност?",o:["T-34","Tiger I","Sherman","Panther"],a:"T-34"},
  {q:"Какво е muzzle velocity важно за?",o:["Скорост на куршума и пробивна сила","Броня","Точност","Тегло на танка"],a:"Скорост на куршума и пробивна сила"},
  {q:"Кой танк има електронен FCS за автоматично следене на цели?",o:["Leopard 2","T-55","Panzer IV","IS-2"],a:"Leopard 2"},
  {q:"Какво е slat armor?",o:["Стоманена мрежа за отклоняване на RPG","Тип ERA","Гладка броня","Тънка броня"],a:"Стоманена мрежа за отклоняване на RPG"},
  {q:"Какво означава 'overmatch' при броня?",o:["Когато калибърът на куршума е по-голям от бронята","Бързо движение","Силна експлозия","Ниска точност"],a:"Когато калибърът на куршума е по-голям от бронята"},
  {q:"Кой танк използва дизелов двигател с висока мощност?",o:["Leopard 2","M1 Abrams","Challenger 2","T-14 Armata"],a:"Leopard 2"},
  {q:"Какво е sloped glacis?",o:["Предна наклонена броня за deflection","Задна броня","Купол","Оръдие"],a:"Предна наклонена броня за deflection"},
  {q:"Кой танк има най-добра мобилност при тежка броня?",o:["Leopard 2","Maus","Tiger I","IS-2"],a:"Leopard 2"},
  {q:"Какво е soft kill APS метод?",o:["Отклонява заплахата без разрушаване","Унищожава ракети","Повишава бронята","Увеличава скоростта"],a:"Отклонява заплахата без разрушаване"},
  {q:"Какво е hard kill APS метод?",o:["Физическо унищожаване на снаряда","Отклоняване","Повишаване бронята","Скорост"],a:"Физическо унищожаване на снаряда"},
  {q:"Кой танк използва blowout panels за защита на екипажа?",o:["M1 Abrams","T-55","Panther","IS-2"],a:"M1 Abrams"},
  {q:"Какво е turret ring диаметър важен за?",o:["Пространство за екипажа и оръдието","Тегло","Броня","Скорост"],a:"Пространство за екипажа и оръдието"},
  {q:"Какво е kinetic energy penetrator?",o:["Снаряд с голяма кинетична енергия за пробиване на броня","Експлозивен","Газов","Лазерен"],a:"Снаряд с голяма кинетична енергия за пробиване на броня"},
  {q:"Какво е APFSDS снаряд?",o:["Armor Piercing Fin Stabilized Discarding Sabot","High Explosive","Tandem HEAT","Kinetic shell"],a:"Armor Piercing Fin Stabilized Discarding Sabot"},
  {q:"Кой танк има тандемна APS система и ERA комбинация?",o:["T-14 Armata","M1 Abrams","Leopard 2","Challenger 2"],a:"T-14 Armata"},
  {q:"Кой танк използва стомана + композит + ERA в бронята си?",o:["T-14 Armata","Leopard 2","Abrams","Merkava"],a:"T-14 Armata"},
  {q:"Кой танк има термален прицел и нощен FCS?",o:["Leopard 2","Tiger I","Panther","T-55"],a:"Leopard 2"},
  {q:"Какво е spaced armor предимство?",o:["Разсейва кинетичната енергия на куршума","Тънка броня","Лесна поддръжка","Повишава скоростта"],a:"Разсейва кинетичната енергия на куршума"},
  {q:"Какво е hull down позиция?",o:["Само куполът е видим за противника","Целият танк","Без оръдие","Скрит двигател"],a:"Само куполът е видим за противника"},
  {q:"Кой танк използва тандемна ERA срещу HEAT и RPG снаряди?",o:["T-90","Abrams","Leopard 2","Challenger 2"],a:"T-90"},
  {q:"Какво е engine horsepower важно за?",o:["Мобилност","Броня","Оръдие","Точност"],a:"Мобилност"}
];

let current=0, score=0, timeLeft=360, timerId=null;
let userAnswers=[];

const qEl=document.getElementById("question"), aEl=document.getElementById("answers"), pEl=document.getElementById("progress"), tEl=document.getElementById("timer");

function shuffle(array){for(let i=array.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[array[i],array[j]]=[array[j],array[i]];}return array;}

function startTimer(){
  timerId=setInterval(()=>{
    let m=Math.floor(timeLeft/60), s=timeLeft%60;
    tEl.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
    if(timeLeft<=0){ clearInterval(timerId); showResult(); }
    timeLeft--;
  },1000);
}

function load(){
  if(current>=questions.length){ showResult(); return; }
  let q=questions[current]; qEl.textContent=q.q; aEl.innerHTML="";
  let shuffledOptions=shuffle([...q.o]);
  shuffledOptions.forEach(opt=>{
    let b=document.createElement("button"); b.textContent=opt; b.onclick=()=>answer(opt); aEl.appendChild(b);
  });
  pEl.textContent=`Въпрос ${current+1} / ${questions.length}`;
}

function answer(opt){
  let correct=questions[current].a;
  userAnswers.push({q:questions[current].q,user:opt,correct});
  if(opt===correct) score++;
  current++; load();
}

function showResult(){
  clearInterval(timerId);
  qEl.textContent="Край!";
  let html=`<p>Резултат: ${score} / ${questions.length}</p>`;
  userAnswers.forEach(x=>{ let ok=x.user===x.correct; html+=`<p class='${ok?"correct":"wrong"}'>${x.q}<br>Ти: ${x.user} | Вярно: ${x.correct}</p>`;});
  html+=`<button onclick="location.reload()">Рестарт</button>`;
  aEl.innerHTML=html; pEl.textContent="";
}

startTimer(); load();
</script>
</body>
</html>
