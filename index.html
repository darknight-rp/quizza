<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tank Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .quiz-box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 340px;
      text-align: center;
    }
    button {
      display: block;
      width: 100%;
      margin: 5px 0;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }
    button:hover { background: #2563eb; }
    .small { margin-top: 10px; font-size: 12px; color: gray; }
    .timer { font-weight: bold; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="quiz-box">
    <div class="timer" id="timer"></div>
    <h2 id="question"></h2>
    <div id="answers"></div>
    <p class="small" id="progress"></p>
  </div>

  <script>
    const questions = [
      { question: "Коя държава създава T-34?", options: ["Германия","САЩ","СССР","UK"], answer: "СССР" },
      { question: "Какво означава MBT?", options: ["Main Battle Tank","Mega Tank","Modern Tank","Mobile Tank"], answer: "Main Battle Tank" },
      { question: "Кой е немски танк?", options: ["Tiger I","Sherman","T-90","Leopard 2"], answer: "Tiger I" },
      { question: "Abrams е от?", options: ["USA","Germany","Russia","UK"], answer: "USA" },
      { question: "Leopard 2 е от?", options: ["France","Germany","USA","Italy"], answer: "Germany" },
      { question: "T-90 е от?", options: ["China","Russia","USA","UK"], answer: "Russia" },
      { question: "Challenger 2 е от?", options: ["UK","USA","France","Germany"], answer: "UK" },
      { question: "AMX-56 Leclerc е от?", options: ["France","Germany","Italy","Spain"], answer: "France" },
      { question: "Кой е американски танк?", options: ["Abrams","T-72","Leopard","Challenger"], answer: "Abrams" },
      { question: "T-72 е от?", options: ["Russia","USA","UK","France"], answer: "Russia" },
      { question: "Panther е?", options: ["German","American","Russian","British"], answer: "German" },
      { question: "Sherman е от?", options: ["USA","Germany","Russia","Japan"], answer: "USA" },
      { question: "Merkava е от?", options: ["Israel","USA","Germany","France"], answer: "Israel" },
      { question: "Type 99 е от?", options: ["China","Japan","USA","Russia"], answer: "China" },
      { question: "Tiger II е?", options: ["German","USA","UK","France"], answer: "German" },
      { question: "T-14 Armata е от?", options: ["Russia","USA","China","UK"], answer: "Russia" },
      { question: "Which tank uses gas turbine engine?", options: ["Abrams","T-72","Leopard 2","Challenger"], answer: "Abrams" },
      { question: "Which tank is Israeli?", options: ["Merkava","Abrams","Leopard","T-90"], answer: "Merkava" },
      { question: "Which is British tank?", options: ["Challenger","Abrams","Leopard","T-72"], answer: "Challenger" },
      { question: "Which is French tank?", options: ["Leclerc","Abrams","Merkava","T-90"], answer: "Leclerc" }
    ];

    let current = 0;
    let score = 0;
    let timeLeft = 360; // 6 минути

    const questionEl = document.getElementById("question");
    const answersEl = document.getElementById("answers");
    const progressEl = document.getElementById("progress");
    const timerEl = document.getElementById("timer");

    function updateTimer() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      timerEl.textContent = `⏱️ ${minutes}:${seconds.toString().padStart(2, '0')}`;
      if (timeLeft <= 0) {
        showResult();
      }
      timeLeft--;
    }

    setInterval(updateTimer, 1000);

    function loadQuestion() {
      const q = questions[current];
      questionEl.textContent = q.question;
      answersEl.innerHTML = "";

      q.options.forEach(option => {
        const btn = document.createElement("button");
        btn.textContent = option;
        btn.onclick = () => selectAnswer(option);
        answersEl.appendChild(btn);
      });

      progressEl.textContent = `Въпрос ${current + 1} от ${questions.length}`;
    }

    function selectAnswer(option) {
      if (option === questions[current].answer) score++;
      current++;
      if (current < questions.length) loadQuestion();
      else showResult();
    }

    function showResult() {
      questionEl.textContent = "Край!";
      answersEl.innerHTML = `<p>Резултат: ${score} / ${questions.length}</p><button onclick=\"location.reload()\">Рестарт</button>`;
      progressEl.textContent = "";
    }

    loadQuestion();
  </script>
</body>
</html>
