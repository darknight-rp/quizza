<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tank Quiz – 60 Танка</title>
<style>
body { font-family: Arial, sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
.quiz { max-width: 900px; margin: auto; background: #222; padding: 20px; border-radius: 12px; }
img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; }
button { padding: 15px 25px; margin: 8px; border: none; border-radius: 8px; background: #444; color: #fff; cursor: pointer; font-size: 16px; transition: 0.3s; }
button:hover { background: #00bfff; }
#result { margin-top: 20px; font-size: 24px; }
</style>
</head>
<body>

<div class="quiz">
  <h1>Познай танка! (60 въпроса)</h1>
  <img id="tankImg" src="" alt="Tank">
  <div id="buttons">
    <button onclick="answer(this)"></button>
    <button onclick="answer(this)"></button>
    <button onclick="answer(this)"></button>
    <button onclick="answer(this)"></button>
  </div>
  <div id="result"></div>
</div>

<script>
// -----------------------------
// 60 танка с реални Wikimedia снимки
// -----------------------------

  {name:"Tiger I", img:"https://upload.wikimedia.org/wikipedia/commons/3/30/Bundesarchiv_Bild_101I-298-1385-32A%2C_Panzer_VI_%22Tiger%22.jpg"},
  {name:"Panther", img:"https://upload.wikimedia.org/wikipedia/commons/2/2b/Panzer_V_Panther.jpg"},

  {name:"Leopard 2", img:"https://upload.wikimedia.org/wikipedia/commons/f/f5/Leopard_2A6M.jpg"},
  {name:"Challenger 2", img:"https://upload.wikimedia.org/wikipedia/commons/9/9f/Challenger_2.jpg"},
  {name:"T-72", img:"https://upload.wikimedia.org/wikipedia/commons/7/70/T-72M1_2009.jpg"},
  {name:"T-90", img:"https://upload.wikimedia.org/wikipedia/commons/4/4a/T-90_MS_2016.jpg"},

  {name:"SU-100", img:"https://upload.wikimedia.org/wikipedia/commons/0/0b/SU-100.JPG"},
  {name:"Object 212", img:"https://upload.wikimedia.org/wikipedia/commons/4/42/Object_212_tank.jpg"}
];

// -----------------------------
// quiz логика
// -----------------------------
function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

let current = 0, score = 0;
shuffle(quizData);

function loadQuestion() {
  if (current >= quizData.length) {
    document.getElementById("buttons").style.display = "none";
    document.getElementById("result").innerText = `Край! Твоят резултат: ${score} / ${quizData.length}`;
    return;
  }

  const q = quizData[current];
  document.getElementById("tankImg").src = q.img;

  let options = [q.name];
  while (options.length < 4) {
    let pick = quizData[Math.floor(Math.random() * quizData.length)].name;
    if (!options.includes(pick)) options.push(pick);
  }
  shuffle(options);

  const btns = document.querySelectorAll("#buttons button");
  btns.forEach((btn,i) => btn.innerText = options[i]);
}

function answer(btn) {
  if (btn.innerText === quizData[current].name) score++;
  current++;
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
