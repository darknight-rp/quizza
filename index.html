<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tank Quiz</title>
  <style>
    body { font-family: Arial; background:#f3f4f6; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
    .quiz-box { background:white; padding:20px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); width:360px; text-align:center; max-height:90vh; overflow:auto; }
    button { display:block; width:100%; margin:5px 0; padding:10px; border:none; border-radius:8px; background:#3b82f6; color:white; cursor:pointer; }
    button:hover { background:#2563eb; }
    .correct { color:green; }
    .wrong { color:red; }
    .timer { font-weight:bold; margin-bottom:10px; }
    .small { font-size:12px; color:gray; }
  </style>
</head>
<body>
<div class="quiz-box">
  <div class="timer" id="timer"></div>
  <h2 id="question"></h2>
  <div id="answers"></div>
  <p class="small" id="progress"></p>
</div>

<script>
const questions = [
  {q:"T-34 е от?",o:["Germany","USSR","USA","UK"],a:"USSR"},
  {q:"MBT означава?",o:["Main Battle Tank","Mega Tank","Modern Tank","Mobile Tank"],a:"Main Battle Tank"},
  {q:"Tiger I е?",o:["German","USA","UK","Russia"],a:"German"},
  {q:"Abrams е от?",o:["USA","Germany","Russia","UK"],a:"USA"},
  {q:"Leopard 2 е от?",o:["Germany","France","USA","Italy"],a:"Germany"},
  {q:"T-90 е от?",o:["Russia","USA","China","UK"],a:"Russia"},
  {q:"Challenger 2 е?",o:["UK","USA","France","Germany"],a:"UK"},
  {q:"Leclerc е от?",o:["France","Germany","Italy","Spain"],a:"France"},
  {q:"Merkava е от?",o:["Israel","USA","Germany","France"],a:"Israel"},
  {q:"Type 99 е от?",o:["China","Japan","USA","Russia"],a:"China"},
  {q:"Panther е?",o:["German","USA","UK","Russia"],a:"German"},
  {q:"Sherman е от?",o:["USA","Germany","Russia","Japan"],a:"USA"},
  {q:"Tiger II е?",o:["German","USA","UK","France"],a:"German"},
  {q:"T-14 Armata е от?",o:["Russia","USA","China","UK"],a:"Russia"},
  {q:"Gas turbine tank?",o:["Abrams","T-72","Leopard","Challenger"],a:"Abrams"},
  {q:"British tank?",o:["Challenger","Abrams","Leopard","T-72"],a:"Challenger"},
  {q:"French tank?",o:["Leclerc","Abrams","Merkava","T-90"],a:"Leclerc"},
  {q:"Russian tank?",o:["T-72","Abrams","Leopard","Challenger"],a:"T-72"},
  {q:"German tank?",o:["Leopard","Abrams","T-90","Merkava"],a:"Leopard"},
  {q:"Israeli tank?",o:["Merkava","T-72","Leopard","Abrams"],a:"Merkava"},
  {q:"USA tank?",o:["Abrams","T-90","Leclerc","Type 99"],a:"Abrams"},
  {q:"WW2 US tank?",o:["Sherman","Tiger","T-34","Panther"],a:"Sherman"},
  {q:"WW2 USSR tank?",o:["T-34","Tiger","Sherman","Panther"],a:"T-34"},
  {q:"WW2 German tank?",o:["Panther","Sherman","T-34","Abrams"],a:"Panther"},
  {q:"Modern Russian tank?",o:["T-90","Tiger","Sherman","Panther"],a:"T-90"},
  {q:"Modern US tank?",o:["Abrams","Tiger","T-34","Panther"],a:"Abrams"},
  {q:"Modern German tank?",o:["Leopard 2","Tiger","T-34","Sherman"],a:"Leopard 2"},
  {q:"Modern UK tank?",o:["Challenger 2","Tiger","Abrams","T-90"],a:"Challenger 2"},
  {q:"Modern French tank?",o:["Leclerc","Abrams","T-90","Leopard"],a:"Leclerc"},
  {q:"Asian tank?",o:["Type 99","Abrams","Leopard","Challenger"],a:"Type 99"},
  {q:"Heavy German tank?",o:["Tiger","Sherman","T-34","Abrams"],a:"Tiger"},
  {q:"Fast tank WW2?",o:["T-34","Tiger","Leopard","Abrams"],a:"T-34"},
  {q:"Cold war tank?",o:["T-72","Tiger","Panther","Sherman"],a:"T-72"},
  {q:"Advanced Russian tank?",o:["Armata","Tiger","Sherman","Leopard"],a:"Armata"},
  {q:"Best known US tank?",o:["Abrams","Tiger","T-34","Leopard"],a:"Abrams"}
];

let current=0, score=0, timeLeft=360;
let userAnswers=[];

const qEl=document.getElementById("question");
const aEl=document.getElementById("answers");
const pEl=document.getElementById("progress");
const tEl=document.getElementById("timer");

function timer(){
  let m=Math.floor(timeLeft/60);
  let s=timeLeft%60;
  tEl.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  if(timeLeft<=0) showResult();
  timeLeft--;
}
setInterval(timer,1000);

function load(){
  let q=questions[current];
  qEl.textContent=q.q;
  aEl.innerHTML="";
  q.o.forEach(opt=>{
    let b=document.createElement("button");
    b.textContent=opt;
    b.onclick=()=>answer(opt);
    aEl.appendChild(b);
  });
  pEl.textContent=`Въпрос ${current+1} / ${questions.length}`;
}

function answer(opt){
  let correct=questions[current].a;
  userAnswers.push({q:questions[current].q, user:opt, correct});
  if(opt===correct) score++;
  current++;
  if(current<questions.length) load(); else showResult();
}

function showResult(){
  qEl.textContent="Край!";
  let html=`<p>Резултат: ${score} / ${questions.length}</p>`;
  userAnswers.forEach(x=>{
    let ok=x.user===x.correct;
    html+=`<p class="${ok?"correct":"wrong"}">
      ${x.q}<br>
      Ти: ${x.user} | Вярно: ${x.correct}
    </p>`;
  });
  html+=`<button onclick="location.reload()">Рестарт</button>`;
  aEl.innerHTML=html;
  pEl.textContent="";
}

load();
</script>
</body>
</html>
